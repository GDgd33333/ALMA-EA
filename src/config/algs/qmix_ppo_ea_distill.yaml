# --- QMIX with PPO + EA + Elite Distillation ---
# 配置文件：QMIX算法结合PPO任务分配、进化算法(EA)和精英蒸馏机制
# 
# 核心思想：
# - EA负责"产答案"：在评估阶段发现成功的任务分配序列
# - PPO负责"学答案"：通过蒸馏损失学习这些好结构
# - 学的方式不是替换参数，而是"精英蒸馏"
#
# PPO (Proximal Policy Optimization) 是A2C的改进版本，使用clipped objective限制策略更新幅度

# ==================== 动作选择策略 ====================
# use epsilon greedy action selector
action_selector: "epsilon_greedy"  # 动作选择器类型：epsilon贪心策略
epsilon_start: 1.0  # 探索率初始值：100%随机探索
epsilon_finish: 0.05  # 探索率最终值：5%随机探索
epsilon_anneal_time: 2000000  # 探索率退火时间：200万步内从1.0降到0.05

# ==================== 训练运行配置 ====================
runner: "parallel"  # 运行器类型：并行训练
batch_size_run: 8  # 并行运行的批次大小：8个环境同时运行
training_iters: 8  # 每次训练迭代的步数：8步

# ==================== 实体和观察配置 ====================
entity_last_action: True # 是否在实体中包含用户控制智能体的最后动作（one-hot编码）

# ==================== 经验回放配置 ====================
buffer_size: 5000  # 经验回放缓冲区大小：存储5000个经验

# ==================== 目标网络更新 ====================
# update the target network every {} episodes
target_update_interval: 150  # 目标网络更新间隔：每150个episode更新一次
alloc_target_update_interval: 50  # 分配网络目标更新间隔：每50个episode更新一次

# ==================== Q学习配置 ====================
# use the Q_Learner to train
agent_output_type: "q"  # 智能体输出类型：Q值
learner: "q_learner"  # 学习器类型：Q学习器
double_q: True  # 是否使用Double Q-learning：减少过估计问题
mixer: "flex_qmix"  # 混合网络类型：灵活的QMIX混合器
mixing_embed_dim: 32  # 混合网络嵌入维度：32维
hypernet_embed: 128  # 超网络嵌入维度：128维
softmax_mixing_weights: True  # 是否对混合权重使用softmax：确保权重和为1
rnn_hidden_dim: 64  # RNN隐藏层维度：64维
mac: "entity_mac"  # 多智能体控制器类型：实体MAC
attn_embed_dim: 128  # 注意力机制嵌入维度：128维
attn_n_heads: 4  # 注意力头数：4个注意力头
lmbda: 0.5  # 混合权重参数：0.5

# ==================== 智能体配置 ====================
agent:
  recurrent: False  # 是否使用循环神经网络：不使用RNN
  entity_scheme: True  # 是否使用实体方案：使用实体表示
  imagine: False  # 是否使用想象机制：不使用想象
  subtask_cond: "mask"  # 子任务条件类型：使用掩码机制
  rnn_hidden_dim: 64  # 智能体RNN隐藏层维度：64维
  obs_agent_id: True  # 观察中是否包含智能体ID：包含
  obs_last_action: True  # 观察中是否包含最后动作：包含

# ==================== 进化算法(EA)配置 ====================
use_ea: True  # 是否启用进化算法：启用
ea_config:
  population_size: 5  # 种群大小：5个个体
  elite_size: 2  # 精英个体数量：保留2个最优个体
  mutation_rate: 0.1  # 变异率：10%的基因发生变异
  mutation_strength: 0.1  # 变异强度：0.1
  crossover_rate: 0.8  # 交叉率：80%的个体参与交叉
  selection_type: "tournament"  # 选择策略：锦标赛选择
  tournament_size: 3  # 锦标赛大小：每次选择3个个体竞争
  evaluation_episodes: 5  # 评估episode数：每个个体评估5个episode
  sync_interval: 10000  # 同步间隔：每10000步进行一次同步
  # 双向同步配置
  enable_bidirectional_sync: True  # 启用双向同步：允许种群和主网络相互学习
  sync_threshold: 0.05  # 同步阈值：性能提升超过5%才进行同步
  # ==================== 精英蒸馏配置 ====================
  elite_buffer_size: 200  # EliteBuffer最大容量：存储200条精英分配序列
  elite_min_score: 0.0  # 最小分数阈值：用于筛选精英（episode return或success标志）
  elite_use_relative_ranking: True  # 是否使用相对排名策略（处理低成功率情况）
  elite_top_k_percent: 0.3  # 保存前K%的episode（0.3表示前30%，用于相对排名）
  # 说明：
  # - elite_buffer_size: 建议100-200条，足够存储多个成功分配，避免单一模板
  # - elite_min_score: 0.0表示只保存成功的分配（success=1），也可以设置为reward阈值（如5.0）
  # - elite_use_relative_ranking: True表示如果成功率低，会保存reward排名前30%的episode
  # - elite_top_k_percent: 0.3表示保存前30%的episode（可以调整为0.2-0.5）
  # 
  # 混合策略说明：
  # 1. 绝对成功优先：如果battle_won=True，直接保存
  # 2. reward阈值：如果episode_reward > elite_min_score，保存
  # 3. 相对排名：如果启用且最近有20+个episode，保存reward排名前30%的
  # 这样即使成功率很低，EliteBuffer也能积累"相对好"的经验

# ==================== 分层智能体配置 ====================
# Hierarchical agent configuration with PPO
hier_agent:
  task_allocation: "ppo"  # 任务分配策略：PPO算法
  alloc_policy: "ppo"  # 分配策略网络类型：PPO Actor（复用A2C网络）
  alloc_critic: "ppo"  # 分配Critic网络类型：PPO Critic（复用A2C网络）
  alloc_opt: "adam"  # 分配网络优化器：Adam优化器
  entropy_loss: 0.005  # 熵正则化系数：0.005（PPO建议值，不要过大）
  action_length: 5  # 动作序列长度：每个动作序列长度为5
  subtask_mask: True  # 是否使用子任务掩码：使用
  alloc_eps: "0.0-0.0-0.0"  # 任务分配探索率：PPO主要靠采样+entropy，不使用epsilon-greedy
  prop_alloc_eps: ""  # PPO不需要提案探索，留空
  decay_old: 150000  # 旧数据衰减：线性衰减150000步之前的数据权重
  max_bs: 400  # 最大批次大小：分配训练的最大批次大小
  # 自回归(AR)配置
  use_autoreg: True  # 是否使用自回归任务分配：启用AR模式，按顺序生成任务分配
  pi_autoreg: True  # 是否使用自回归策略：启用AR策略网络
  # PPO超参数
  ppo_epochs: 4  # PPO更新轮数：使用同一批数据进行多次更新
  ppo_clip: 0.2  # PPO裁剪系数：限制策略更新幅度，防止更新过大
  ppo_minibatch_size: null  # PPO minibatch大小：null表示使用full batch，或设置为整数（如64）
  # PPO不需要n_proposals参数（已移除）
  # ==================== 精英蒸馏配置 ====================
  use_distill: True  # 是否启用精英蒸馏：启用
  distill_weight: 0.05  # 蒸馏损失权重：0.05（可调，建议0.01-0.1）
  distill_batch_size: 16  # 从EliteBuffer采样的batch size：16
  distill_min_lp_per_step: -2.0  # 门控阈值（每步平均logprob）：低于此值跳过蒸馏，防止拉崩策略
  distill_warmup_elites: 20  # 早期禁用阈值：elite buffer size < 20时不蒸馏，避免质量不稳定的精英拉偏策略

# ==================== 网络结构配置 ====================
alloc_embed_dim: 128  # 分配网络嵌入维度：128维
alloc_n_heads: 4  # 分配网络注意力头数：4个

# ==================== 日志和模型保存 ====================
# Logging and saving
use_tensorboard: True  # 是否使用TensorBoard：使用
save_model: True  # 是否保存模型：保存
save_model_interval: 1000000  # 模型保存间隔：每100万步保存一次模型

# ==================== 实验名称 ====================
name: "qmix_ppo_ea_distill"  # 实验名称：qmix_ppo_ea_distill

# ==================== 精英蒸馏机制说明 ====================
# 
# 训练流程：
# 1. PPO正常rollout（30-50条meta episode）
# 2. PPO正常计算L_PPO
# 3. 如果EliteBuffer非空：
#       从EliteBuffer采样16条精英
#       计算L_distill = -mean(log_prob)
#       计算lambda_distill（动态调整：前期0.01，中期0.05，后期0.1）
# 4. L_total = L_PPO + lambda_distill * L_distill
# 5. optimizer.step()
# 
# 6. EA定期评估：
#       搜索新分配
#       成功的存入EliteBuffer
#       参数同步照旧
#
# 三条铁律：
# 1. 精英数据绝不参与PPO ratio/advantage（只用于辅助监督损失）
# 2. 精英的alloc_order必须原样使用（保持自回归模式一致性）
# 3. EliteBuffer必须是"多条精英"（100-200条，避免单一模板）
#
# 预期效果：
# - 最终success rate明显提高（而不是更快）
# - PPO不再频繁退化回"保守但次优"的分配结构
# - 不同随机种子的最终表现差距变小
# - EA找到的新好分配，会逐渐被PPO"学会并复现"
#
# TensorBoard统计：
# - losses/alloc_distill_loss: 蒸馏损失值
# - train_metrics/alloc_distill_weight: 当前蒸馏权重
# - train_metrics/elite_buffer_size: EliteBuffer当前大小

